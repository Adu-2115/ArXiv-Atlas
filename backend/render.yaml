services:
  - type: web
    name: arxiv-research-agent-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_EXTRACTION_MODEL
        value: llama-3.3-70b-versatile
      - key: FRONTEND_ORIGIN
        sync: false
