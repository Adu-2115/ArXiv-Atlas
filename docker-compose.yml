services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - GROQ_QUERY_EXPANSION_MODEL=${GROQ_QUERY_EXPANSION_MODEL:-llama-3.1-8b-instant}
      - GROQ_EXTRACTION_MODEL=${GROQ_EXTRACTION_MODEL:-llama-3.1-8b-instant}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:3000}
      - HISTORY_DB_PATH=/app/data/research_history.db
    volumes:
      # Persist the disk cache and search history across container restarts.
      - backend_cache:/app/.cache
      - backend_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  backend_cache:
  backend_data:
